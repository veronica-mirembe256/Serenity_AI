name: serenity
description: Serenity - AI-powered recovery companion. Flutter Web SaaS dashboard.
publish_to: none
version: 2.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  dio: ^5.4.3
  # http is needed for SSE streaming — Dio does not handle Server-Sent Events.
  # Used exclusively in streaming_service.dart for POST /journal/stream.
  http: ^1.2.1
  go_router: ^14.2.0
  flutter_secure_storage: ^9.0.0
  flutter_animate: ^4.5.0
  fl_chart: ^0.68.0
  google_fonts: ^6.2.1
  gap: ^3.0.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true