# =============================================================================
# Serenity v2 — nginx configuration
#
# Fixes applied:
#   FIX 1.2-E — TLS termination; uvicorn never faces the internet directly
#   FIX 1.2-D — Only the configured domain is served; all other hosts get 444
#   FIX 2.2   — proxy_buffering off for SSE streaming endpoint
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Hide nginx version from error pages and Server header
    server_tokens off;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    keepalive_timeout 65;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/json
                    application/javascript text/xml application/xml;

    # ── Rate limiting zones ────────────────────────────────────────────────────
    # Belt-and-suspenders: nginx-level rate limiting in addition to slowapi.
    # auth zone: 10 requests/min per IP on login/register
    # api zone:  60 requests/min per IP for general API calls
    limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api_zone:10m  rate=60r/m;

    # ── Redirect all HTTP → HTTPS ──────────────────────────────────────────────
    server {
        listen 80;
        server_name your-serenity-domain.com;   # CHANGE THIS

        # ACME challenge for Let's Encrypt cert renewal
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Drop requests for unknown hosts ───────────────────────────────────────
    server {
        listen 80  default_server;
        listen 443 default_server ssl;
        ssl_certificate     /etc/letsencrypt/live/your-serenity-domain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/your-serenity-domain.com/privkey.pem;
        return 444;   # silently close connection
    }

    # ── Main HTTPS server ──────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name your-serenity-domain.com;   # CHANGE THIS

        # ── TLS certificates (Let's Encrypt / Certbot) ──────────────────────
        ssl_certificate     /etc/letsencrypt/live/your-serenity-domain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/your-serenity-domain.com/privkey.pem;

        # ── TLS hardening ────────────────────────────────────────────────────
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;
        ssl_session_tickets       off;

        # OCSP stapling — speeds up TLS handshake
        ssl_stapling        on;
        ssl_stapling_verify on;
        resolver            8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout    5s;

        # ── Security headers (belt-and-suspenders alongside FastAPI middleware)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options           "DENY"                         always;
        add_header X-Content-Type-Options    "nosniff"                      always;
        add_header X-XSS-Protection          "1; mode=block"                always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=()" always;

        # ── Request size limit ───────────────────────────────────────────────
        client_max_body_size 2m;   # journal entries are text; 2 MB is generous

        # ── Auth endpoints — stricter rate limit ─────────────────────────────
        location ~ ^/auth/(login|register) {
            limit_req zone=auth_zone burst=5 nodelay;
            limit_req_status 429;

            proxy_pass         http://api:8080;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── SSE streaming endpoint — buffering MUST be off ───────────────────
        # FIX 2.2: without proxy_buffering off, nginx batches SSE events and
        # the Flutter client receives nothing until the entire response is done,
        # defeating the purpose of streaming entirely.
        location /journal/stream {
            limit_req zone=api_zone burst=10 nodelay;

            proxy_pass         http://api:8080;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # SSE-specific settings
            proxy_buffering       off;         # critical — send chunks immediately
            proxy_cache           off;
            proxy_read_timeout    300s;        # keep connection open for full pipeline
            proxy_http_version    1.1;
            chunked_transfer_encoding on;
        }

        # ── All other API endpoints ───────────────────────────────────────────
        location / {
            limit_req zone=api_zone burst=20 nodelay;

            proxy_pass         http://api:8080;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_http_version 1.1;
        }
    }
}